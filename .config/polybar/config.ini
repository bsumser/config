[module/filesystem]
type = internal/fs
interval = 25

mount-0 = /

label-mounted = %{F#ebdbb2}MNT%{F-} %percentage_used%%

label-unmounted = %mountpoint% not mounted
label-unmounted-foreground = ${colors.disabled}

[module/memory]
type = internal/memory

interval = 2

format-prefix = "RAM "
format-prefix-foreground = ${colors.white}

label = %percentage_used%%

[module/cpu]
type = internal/cpu

interval = 2

format-prefix = "CPU "
format-prefix-foreground = ${colors.white}

label = %percentage:2%%
click-right = alacritty -e htop
[module/powermenu]
type = custom/menu

expand-right = true

format-spacing = 1

label-active-font = 1
label-open = "PWR"
label-open-foreground = ${colors.red}
label-close = "PWR"
label-close-foreground = ${colors.red}
label-separator = | 
label-separator-foreground = ${colors.fg}

menu-0-0 = "Shutdown"
menu-0-0-exec = poweroff
menu-0-1 = "Reboot"
menu-0-1-exec = reboot
menu-0-2 = "Log out"
menu-0-2-exec = bspc quit

[module/title]
type = internal/xwindow

format = <label>
label = %title%
; vim:ft=dosini
