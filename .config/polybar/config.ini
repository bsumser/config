; https://github.com/rixVe/GruvboxDotfiles/blob/main/polybar/config.ini

[colors]
purple = #83a598
green = #b8bb26
red = #cc241d
bg = #1d2021
fg = #ebdbb2
alpha = #00000000
white = #ebdbb2
yellow = #d79921
dim = #504945

[bar/top]
monitor = ${env:MONITOR:}

override-redirect = false

bottom = true

fixed-center = true

width = 100%
height = 25

offset-x = 
offset-y =  

background = ${colors.bg}

foreground = ${colors.fg}

line-size = 2
line-color = #fff

padding-right = 1 
padding-left = 0

module-margin = 0

font-0 = "Iosevka:pixelsize=12;3"

modules-left = i3 
modules-center = date 
modules-right = memory sps cpu sps filesystem sps pulseaudio sps powermenu
separator =

spacing = 0

dim-value = 1.0

wm-name = i3

tray-position = right

tray-detached = false

tray-background = ${colors.bg}

tray-offset-x = 0
tray-offset-y = 0

tray-padding = 0

tray-scale = 1

wm-restack = i3

dpi-x = 96
dpi-y = 96

enable-ipc = false

border-color = ${colors.alpha}

[module/i3]
type = internal/i3

; Only show workspaces defined on the same output as the bar
;
; Useful if you want to show monitor specific workspaces
; on different bars
;
; Default: false
pin-workspaces = true

; Show urgent workspaces regardless of whether the workspace is actually hidden 
; by pin-workspaces.
;
; Default: false
; New in version 3.6.0
show-urgent = true

; This will split the workspace name on ':'
; Default: false
strip-wsnumbers = true

; Sort the workspaces by index instead of the default
; sorting that groups the workspaces by output
; Default: false
index-sort = true

; Create click handler used to focus workspace
; Default: true
enable-click = false

; Create scroll handlers used to cycle workspaces
; Default: true
enable-scroll = false

; Wrap around when reaching the first/last workspace
; Default: true
wrapping-scroll = false

; Set the scroll cycle direction 
; Default: true
reverse-scroll = false

; Use fuzzy (partial) matching on labels when assigning 
; icons to workspaces
; Example: code;♚ will apply the icon to all workspaces 
; containing 'code' in the label
; Default: false
fuzzy-match = true

[module/date]
type = internal/date

interval = 1.0

time = %{T0}%H:%M:%S%{T-}
date = %{T0} %a %d.%m.%Y%{T-}

label = %time%%date%
label-font = 0
label-foreground = ${colors.white}

[module/sps]
type = custom/text

content = " - "
content-foreground = ${colors.yellow}

content-padding = 0

[module/pulseaudio]
type = internal/pulseaudio

use-ui-max = false

interval = 5

format-volume = <label-volume>

format-muted = <label-muted>

label-volume = %{T0}%percentage%%%{T-}
label-volume-foreground = ${colors.white}

format-volume-prefix = "VOL "
format-volume-prefix-foreground = ${colors.white}

label-muted = %{T0}0%%{T-}
label-muted-foreground = ${colors.fg}

format-muted-prefix = "MUTE "
format-muted-prefix-foreground = ${colors.white}

click-right = pavucontrol &

